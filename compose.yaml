services:
  mcp-gate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-gate
    restart: unless-stopped
    ports:
      - "8090:8000"
    volumes:
      - /opt/_data/mcp-gate:/data
    env_file:
      - .env
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  rag-net:
    external: true
